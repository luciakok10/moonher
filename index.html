<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Bar</title>

<!-- PWA: 加入主畫面後可全螢幕顯示，像獨立App -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111010">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Bar">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111010;--bg2:#1a1918;--bg3:#242220;--bg4:#2e2b29;
  --border:#2e2b29;--border2:#3a3734;
  --text:#f0ece3;--muted:#7a7672;--hint:#4a4845;
  --accent:#c9a84c;--a2:#1a1400;--a3:#8b6820;
  --red:#c05050;--green:#4a9a6a;
  --r:12px;--rs:8px;
}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:72px}
.screen::-webkit-scrollbar{display:none}

.topbar{padding:max(14px,calc(env(safe-area-inset-top) + 6px)) 16px 12px;background:var(--bg2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--text);flex:1}
.back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;padding:0;display:flex;align-items:center;flex-shrink:0}
.icon-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:22px;padding:0;display:flex;align-items:center;flex-shrink:0}

.botnav{background:var(--bg2);border-top:0.5px solid var(--border);display:flex;padding:6px 0 max(8px,env(safe-area-inset-bottom));position:sticky;bottom:0;z-index:10}
.bnbtn{flex:1;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 2px;font-size:9px;font-family:'DM Sans',sans-serif}
.bnbtn.active{color:var(--accent)}

/* home */
.home-hero{padding:max(22px,calc(env(safe-area-inset-top) + 14px)) 16px 14px;background:var(--bg2);border-bottom:0.5px solid var(--border)}
.home-logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--accent)}
.home-tagline{font-size:12px;color:var(--muted);margin-top:3px}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
.hcard{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 12px;cursor:pointer;display:flex;flex-direction:column;gap:7px;min-height:90px}
.hcard:active{opacity:.75}
.hcard.wide{grid-column:span 2}
.hcard.featured{border-color:var(--a3);background:var(--a2)}
.hcard-icon{font-size:20px}
.hcard-label{font-size:13px;font-weight:500;color:var(--text)}
.hcard-sub{font-size:11px;color:var(--muted)}

/* search */
.search-bar{padding:10px 16px;border-bottom:0.5px solid var(--border);background:var(--bg2);position:sticky;top:49px;z-index:9}
.search-bar input{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--rs);color:var(--text);padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.search-bar input::placeholder{color:var(--hint)}
.search-bar input:focus{border-color:var(--a3)}

/* list */
.list-body{padding:10px 16px;display:flex;flex-direction:column;gap:8px}
.rcard{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);display:flex;overflow:hidden;cursor:pointer}
.rcard:active{opacity:.75}
.rcard-img{width:70px;min-height:70px;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:26px}
.rcard-img img{width:100%;height:100%;object-fit:cover}
.rcard-body{padding:10px 12px;flex:1;min-width:0}
.rcard-name{font-size:14px;font-weight:500;color:var(--text)}
.rcard-meta{font-size:11px;color:var(--muted);margin-top:2px}
.rcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.group-label{font-size:11px;color:var(--accent);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin:14px 2px 8px;display:flex;align-items:center;gap:6px}
.group-label:first-child{margin-top:2px}
.group-count{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:0;text-transform:none}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;background:var(--bg3);border:0.5px solid var(--border);color:var(--muted)}
.tag.ac{border-color:var(--a3);color:var(--accent);background:var(--a2)}

/* detail */
.det-img{width:100%;height:190px;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;font-size:56px;opacity:.3}
.det-img img{width:100%;height:100%;object-fit:cover;opacity:1}
.upload-btn{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.6);border:0.5px solid var(--border2);border-radius:7px;color:var(--muted);font-size:11px;padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:4px}
.det-body{padding:14px 16px}
.det-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;margin-bottom:6px}
.det-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg3);color:var(--muted);border:0.5px solid var(--border)}
.det-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.sec{font-size:10px;color:var(--accent);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}

.ingr-list{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.ingr-block{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rs);overflow:hidden}
.ingr-main{display:flex;justify-content:space-between;align-items:center;padding:9px 12px}
.ingr-zh{font-size:13px;font-weight:500}
.ingr-en{font-size:11px;color:var(--muted)}
.ingr-amt{color:var(--accent);font-size:12px;font-weight:500;white-space:nowrap;margin-left:8px}
.bottle-row{border-top:0.5px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:7px}
.bottle-row label{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.bottle-row select{flex:1;background:var(--bg3);border:0.5px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;padding:4px 7px;outline:none;font-family:'DM Sans',sans-serif;min-width:0}
.bottle-info{padding:7px 12px 9px;border-top:0.5px solid var(--border);background:var(--bg3)}
.bi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.abv-num{font-size:15px;font-weight:500}
.abv-sub{font-size:10px;color:var(--muted)}
.sbar-row{display:flex;gap:2px}
.sbar{width:8px;height:8px;border-radius:2px;background:var(--bg4);border:0.5px solid var(--border)}
.sbar.on{background:var(--accent);border-color:var(--accent)}
.flavor-row{display:flex;flex-wrap:wrap;gap:3px}
.ftag{font-size:10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:4px;padding:2px 6px;color:#999}

.mg-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.mg-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rs);padding:10px 11px}
.mgl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.mgv{font-size:13px;font-weight:500}
.mgs{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.3}

.steps{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.step-row{display:flex;gap:9px;align-items:flex-start;font-size:13px;line-height:1.5;color:#ccc}
.snum{background:var(--accent);color:#1a1200;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;margin-top:1px}

.garnish-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rs);padding:11px 13px;margin-bottom:16px}
.gtitle{font-size:10px;color:var(--accent);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.gi{display:flex;align-items:flex-start;gap:7px;font-size:13px;margin-bottom:5px;line-height:1.5}
.gi:last-child{margin-bottom:0}
.gdot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.gnote{font-size:11px;color:var(--muted);margin-top:2px}

.action-row{display:flex;gap:8px}
.btn-fav{flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rs);color:var(--text);padding:11px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'DM Sans',sans-serif}
.btn-fav.on{border-color:var(--accent);color:var(--accent)}
.btn-del{background:none;border:0.5px solid var(--red);border-radius:var(--rs);color:var(--red);padding:11px 14px;cursor:pointer;font-size:13px}
.btn-edit-det{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--rs);color:var(--muted);padding:11px 14px;cursor:pointer;font-size:13px}

/* cabinet */
.bottle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 16px}
.bc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.bc-img{width:100%;height:95px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;font-size:32px;opacity:.4}
.bc-img img{width:100%;height:100%;object-fit:cover;opacity:1}
.bc-upload{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.55);border:0.5px solid var(--border);border-radius:5px;color:var(--muted);font-size:10px;padding:3px 7px;cursor:pointer}
.bc-body{padding:8px 10px}
.bc-name{font-size:12px;font-weight:500;line-height:1.3}
.bc-en{font-size:10px;color:var(--muted);margin-top:1px}
.bc-abv{font-size:11px;color:var(--accent);margin-top:4px}
.bc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.bc-tag{font-size:10px;background:var(--bg3);border:0.5px solid var(--border);border-radius:4px;padding:1px 6px;color:#888}

/* special */
.sp-body{padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.sl{font-size:10px;color:var(--accent);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:13px 11px;cursor:pointer;display:flex;flex-direction:column;gap:5px}
.cat-card:active{opacity:.75}
.cat-card.on{background:var(--a2);border-color:var(--a3)}
.cc-name{font-size:13px;font-weight:500}
.cc-count{font-size:11px;color:var(--muted)}
.pref-group{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rs);padding:10px 12px}
.pref-title{font-size:13px;font-weight:500;margin-bottom:8px}
.pref-opts{display:flex;gap:5px;flex-wrap:wrap}
.popt{font-size:12px;padding:5px 10px;border-radius:20px;border:0.5px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer}
.popt:active{opacity:.75}
.popt.on{background:var(--a2);border-color:var(--a3);color:var(--accent);font-weight:500}
.btn-gen{width:100%;background:var(--accent);border:none;border-radius:var(--rs);color:#1a1200;font-size:14px;font-weight:500;padding:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-gen:disabled{background:var(--bg3);color:var(--muted);cursor:default}
.btn-outline{width:100%;background:var(--bg3);border:0.5px solid var(--a3);border-radius:var(--rs);color:var(--accent);font-size:13px;font-weight:500;padding:11px;cursor:pointer;font-family:'DM Sans',sans-serif}

.result-card{background:var(--bg2);border:0.5px solid var(--a3);border-radius:var(--r);overflow:hidden}
.rh{padding:13px 15px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.rname{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500}
.ren{font-size:11px;color:var(--muted);margin-top:2px}
.rtags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.rtag{font-size:10px;padding:2px 7px;border-radius:7px;background:var(--a2);border:0.5px solid var(--a3);color:var(--accent)}
.btn-save{background:var(--accent);border:none;border-radius:7px;color:#1a1200;font-size:11px;font-weight:500;padding:6px 11px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'DM Sans',sans-serif}
.btn-save.saved{background:var(--bg3);border:0.5px solid var(--border);color:var(--muted);cursor:default}
.rb{padding:13px 15px;display:flex;flex-direction:column;gap:13px}
.concept-box{font-size:12px;color:#aaa;line-height:1.6;background:var(--bg3);border-radius:7px;padding:9px 11px;border-left:2px solid var(--a3)}
.note-box{font-size:12px;color:#aaa;line-height:1.6;background:var(--bg3);border-radius:7px;padding:9px 11px;border-left:2px solid var(--a3)}
.ingr-row2{padding:8px 10px;background:var(--bg3);border-radius:7px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.iz{font-size:13px;font-weight:500}
.ien{font-size:11px;color:var(--muted);margin-top:1px}
.iamt{color:var(--accent);font-size:12px;font-weight:500;white-space:nowrap}
.mg2-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mg2-card{background:var(--bg3);border-radius:7px;padding:8px 10px}

.tweak-section{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.tweak-hd{padding:10px 13px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:6px}
.tweak-hd span{font-size:13px;font-weight:500}
.tweak-hd small{font-size:11px;color:var(--muted)}
.tweak-bd{padding:10px 13px;display:flex;flex-direction:column;gap:9px}
.tweak-row{display:flex;flex-direction:column;gap:5px}
.tweak-lbl{font-size:11px;color:var(--muted)}
.tweak-btns{display:flex;gap:5px;flex-wrap:wrap}
.tbtn{font-size:11px;padding:5px 10px;border-radius:7px;border:0.5px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;white-space:nowrap}
.tbtn.reduce.on{background:#1a0808;border-color:var(--red);color:var(--red)}
.tbtn.boost.on{background:#081a10;border-color:var(--green);color:var(--green)}
.tweak-result-box{background:var(--bg3);border-radius:8px;padding:11px;display:flex;flex-direction:column;gap:6px}
.tweak-tip{display:flex;align-items:flex-start;gap:7px;font-size:12px;line-height:1.5}
.tip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tip-dot.r{background:var(--red)}
.tip-dot.b{background:var(--green)}

/* modal overlay */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:18px 16px max(20px,env(safe-area-inset-bottom));max-height:90dvh;overflow-y:auto}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:14px}
.field{margin-bottom:11px}
.field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--rs);color:var(--text);padding:9px 11px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--a3)}
.field textarea{resize:vertical;min-height:64px;line-height:1.5}
.field-hint{font-size:10px;color:var(--hint);margin-top:3px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.btn-cancel{flex:1;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--rs);color:var(--muted);padding:11px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif}
.btn-submit{flex:2;background:var(--accent);border:none;border-radius:var(--rs);color:#1a1200;padding:11px;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif}

/* favourites */
.fav-list{padding:10px 16px;display:flex;flex-direction:column;gap:8px}
.fav-section-label{font-size:10px;color:var(--accent);font-weight:500;letter-spacing:1.5px;text-transform:uppercase;margin:6px 0 4px}

/* saved specials */
.saved-list{display:flex;flex-direction:column;gap:6px}
.si{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.si:active{opacity:.75}
.si-name{font-size:13px;font-weight:500}
.si-meta{font-size:11px;color:var(--muted);margin-top:2px}

.coming{padding:48px 16px;text-align:center;color:var(--muted);font-size:13px}
.coming div{font-size:36px;margin-bottom:10px;opacity:.3}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 16px}
.divider{height:0.5px;background:var(--border);margin:4px 0}

/* waiting */
.waiting-box{padding:28px;text-align:center;color:var(--muted);font-size:13px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r)}
</style>
</head>
<body>
<div id="app">
  <div class="screen" id="screen"></div>
  <nav class="botnav" id="botnav">
    <button class="bnbtn active" data-nav="home">🏠<span>主頁</span></button>
    <button class="bnbtn" data-nav="cocktails">🍸<span>調酒</span></button>
    <button class="bnbtn" data-nav="cabinet">🍾<span>酒櫃</span></button>
    <button class="bnbtn" data-nav="favourites">⭐<span>收藏</span></button>
    <button class="bnbtn" data-nav="special">✦<span>特調</span></button>
  </nav>
</div>
<div id="modal-root"></div>

<script>
// ─── DATA ───────────────────────────────────────────────
let BOTTLES=[
  // ── 威士忌 ──
  {id:1,name:'美格波本威士忌',en:"Maker's Mark Bourbon",cat:'威士忌',abv:45,flavor:['香草','焦糖','橡木','甜'],strength:3,img:null},
  {id:2,name:'泥煤哥 Big Peat',en:'Big Peat Islay Blended Malt 46%',cat:'威士忌',abv:46,flavor:['泥煤','煙燻','碘','海鹽'],strength:5,img:null},
  {id:3,name:'日本妮卡 Nikka',en:'Nikka From The Barrel 51.4%',cat:'威士忌',abv:51.4,flavor:['果香','麥芽','辛香','木質'],strength:4,img:null},
  {id:4,name:"Michter's Rye Whiskey",en:"Michter's Rye Whiskey 42.4%",cat:'威士忌',abv:42.4,flavor:['裸麥','辛香','香草','木質'],strength:4,img:null},
  {id:5,name:'St-Rémy 白蘭地',en:'St-Rémy Double Wood 40%',cat:'白蘭地',abv:40,flavor:['水果','橡木','香草','焦糖'],strength:3,img:null},
  // ── 琴酒 ──
  {id:6,name:'Tanqueray London Dry',en:'Tanqueray London Dry Gin 43.1%',cat:'琴酒',abv:43.1,flavor:['杜松子','柑橘','草本'],strength:3,img:null},

function abvColor(a){return a>=50?'#e07b4a':a>=40?'#c9a84c':'#7db87d'}

function allCats(){return[...new Set(BOTTLES.filter(b=>b.cat!=='苦精').map(b=>b.cat))]}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ─── ROUTING ─────────────────────────────────────────────
function go(nav){APP.nav=nav;APP.detailType=null;APP.detailId=null;APP.search='';if(nav!=='mocktail')APP.mocktailTool=false;render(true);}
function goDetail(type,id){APP.detailType=type;APP.detailId=id;render(true);}
function goBack(){
  if(APP.sp.result&&APP.nav==='special'){APP.sp.result=null;APP.sp.tweaks={};APP.sp.tweakAdv=null;APP.sp.showTweak=false;render(true);return;}
  APP.detailType=null;APP.detailId=null;render(true);
}


// ─── RENDER ──────────────────────────────────────────────
function render(scrollTop){
  const sc=document.getElementById('screen');
  const prev=sc.scrollTop;
  const nav=APP.nav;
  let html='';
  if(nav==='home') html=renderHome();
  else if(nav==='cocktails'&&APP.detailId) html=renderRecipeDetail();
  else if(nav==='cocktails') html=renderRecipeList();
  else if(nav==='cabinet') html=renderCabinet();
  else if(nav==='favourites') html=renderFavourites();
  else if(nav==='special'&&APP.sp.result) html=renderSpecialResult();
  else if(nav==='special') html=renderSpecial();
  else if(nav==='mocktail'&&APP.detailId) html=renderMocktailDetail();
  else if(nav==='mocktail'&&APP.mocktailTool) html=renderMocktailFormulaTool();
  else if(nav==='mocktail') html=renderMocktailList();
  else if(nav==='food'&&APP.detailId) html=renderFoodDetail();
  else if(nav==='food') html=renderFoodList();
  sc.innerHTML=html;
  sc.scrollTop=scrollTop?0:prev;
  document.querySelectorAll('.bnbtn').forEach(b=>b.classList.toggle('active',b.dataset.nav===nav));
}

// ─── RECIPE LIST ─────────────────────────────────────────
function recipeGroup(r){
  const menuNames=['陳美鳳','鄧荔君','蔡琴','張曼玉','王菲','萬芳'];
  if(menuNames.includes(r.name)) return '菜單調酒';
  if(r.cat==='特調') return '特調';
  return '經典調酒';
}
function renderRecipeList(){
  const q=APP.search.toLowerCase();
  const filtered=RECIPES.filter(r=>!q||r.name.toLowerCase().includes(q)||r.base.toLowerCase().includes(q));
  const groups=['經典調酒','菜單調酒','特調'];
  const groupIcons={'經典調酒':'🍸','菜單調酒':'🎤','特調':'✦'};
  let body='';
  groups.forEach(g=>{
    const items=filtered.filter(r=>recipeGroup(r)===g);
    if(items.length===0)return;
    body+=`<div class="group-label">${groupIcons[g]} ${g}　<span class="group-count">${items.length}</span></div>`;
    body+=items.map(r=>`
    <div class="rcard" onclick="goDetail('recipe',${r.id})">
      <div class="rcard-img">${r.img?`<img src="${r.img}" alt="">`:'🍸'}</div>
      <div class="rcard-body">
        <div class="rcard-name">${esc(r.name)}</div>
        <div class="rcard-meta">${r.name_zh?esc(r.name_zh)+' · ':''}${esc(r.base)}</div>
        <div class="rcard-tags"><span class="tag ac">${esc(r.method.label)}</span><span class="tag">${esc(r.glass.label)}</span>${r.fav?'<span class="tag ac">⭐</span>':''}</div>
      </div>
    </div>`).join('');
  });
  if(!body) body='<div class="empty">沒有找到配方</div>';
  return `<div class="topbar"><button class="back-btn" onclick="go('home')">←</button><span class="topbar-title">調酒作法</span><button class="icon-btn" onclick="openAddRecipeModal()">＋</button></div>
  <div class="search-bar"><input placeholder="搜尋配方..." oninput="APP.search=this.value;render(false)" value="${esc(APP.search)}"></div>
  <div class="list-body">${body}</div>`;
}

// ─── MOCKTAIL FORMULA TOOL ───────────────────────────────
function mfUniqueNames(key){
  const set=new Set();
  MOCKTAIL_FORMULAS.forEach(f=>{ if(f[key].n) set.add(f[key].n); });
  return [...set].sort();
}
function mfAllAName(){ return mfUniqueNames('a'); }
function mfAllBName(){
  const sel=APP.mocktailSel;
  const set=new Set();
  MOCKTAIL_FORMULAS.forEach(f=>{ if((!sel.a||f.a.n===sel.a) && f.b.n) set.add(f.b.n); });
  return [...set].sort();
}
function mfAllCName(){
  const sel=APP.mocktailSel;
  const set=new Set();
  MOCKTAIL_FORMULAS.forEach(f=>{ if((!sel.a||f.a.n===sel.a)&&(!sel.b||f.b.n===sel.b) && f.c.n) set.add(f.c.n); });
  return [...set].sort();
}
function mfMatches(){
  const sel=APP.mocktailSel;
  if(!sel.a&&!sel.b&&!sel.c) return [];
  return MOCKTAIL_FORMULAS.filter(f=>
    (!sel.a||f.a.n===sel.a) && (!sel.b||f.b.n===sel.b) && (!sel.c||f.c.n===sel.c)
  );
}
function mfSetSel(level,val){
  APP.mocktailSel[level]=val;

  if(level==='b'){APP.mocktailSel.c='';}

}

        <div class="rb" style="padding-top:10px">

          <div class="ingr-row2"><div><div class="iz">B・${esc(f.b.n)}</div></div><div class="iamt">${esc(f.b.amt)}${esc(f.b.u)}</div></div>

          ${f.acid.type&&f.acid.type!=='-'?`<div class="ingr-row2"><div><div class="iz">${esc(f.acid.type==='acid'?'Acid 酸液':f.acid.type==='lemon'?'Lemon 檸檬汁':f.acid.type)}</div></div><div class="iamt">${esc(f.acid.amt)}${esc(f.acid.u)}</div></div>`:''}

function renderMocktailDetail(){
  const r=MOCKTAILS.find(x=>x.id===APP.detailId);if(!r)return '';
  return `<div class="topbar"><button class="back-btn" onclick="goBack()">←</button><span class="topbar-title">${esc(r.name)}</span></div>

    <div class="det-meta"><span class="badge">${esc(r.cat)}</span>${r.pairing?`<span style="font-size:12px;color:var(--muted)">搭配：${esc(r.pairing)}</span>`:''}</div>

function handleMocktailImg(e,id){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=ev=>{const r=MOCKTAILS.find(x=>x.id===id);if(r){r.img=ev.target.result;render(false);}};rd.readAsDataURL(f);
}
function toggleMocktailFav(id){const r=MOCKTAILS.find(x=>x.id===id);if(r){r.fav=!r.fav;render(false);}}

function renderComing(title,icon){
  return `<div class="topbar"><button class="back-btn" onclick="go('home')">←</button><span class="topbar-title">${title}</span></div>
  <div class="coming"><div>${icon}</div>酒譜提供後幫你填進來</div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────
function handleImgUpload(e,type,id){
  const f=e.target.files[0];if(!f)return;
  const r2=new FileReader();r2.onload=ev=>{
    if(type==='recipe'){const rec=RECIPES.find(x=>x.id===id);if(rec)rec.img=ev.target.result;}
    else if(type==='bottle'){const b=BOTTLES.find(x=>x.id===id);if(b)b.img=ev.target.result;}
    else if(type==='food'){const rec=FOOD_RECIPES.find(x=>x.id===id);if(rec)rec.img=ev.target.result;}
    render(false);
  };r2.readAsDataURL(f);
}
function setBottleSel(rid,idx,val){
  const rec=RECIPES.find(r=>r.id===rid);
  if(rec)rec.ingr[idx].sel=val?parseInt(val):null;
  render(false);
}
function toggleFav(type,id){
  let item;
  if(type==='recipe') item=RECIPES.find(x=>x.id===id);
  else if(type==='food') item=FOOD_RECIPES.find(x=>x.id===id);
  else if(type==='special') item=SPECIALS.find(x=>x.id===id);
  if(item){item.fav=!item.fav;render(false);}
}
function deleteItem(type,id){
  if(!confirm('確定要刪除？'))return;
  if(type==='recipe'){RECIPES.splice(RECIPES.findIndex(x=>x.id===id),1);}
  else if(type==='food'){FOOD_RECIPES.splice(FOOD_RECIPES.findIndex(x=>x.id===id),1);}
  goBack();
}
function spSetCat(cat){APP.sp.selCat=APP.sp.selCat===cat?null:cat;render(false);}
function spSetPref(k,v){APP.sp.prefs[k]=APP.sp.prefs[k]===v?null:v;render(false);}
function spTweak(dim,dir){
  APP.sp.tweaks[dim]=APP.sp.tweaks[dim]===dir?undefined:dir;
  if(!APP.sp.tweaks[dim])delete APP.sp.tweaks[dim];
  APP.sp.showTweak=false;render(false);
}
function spAskTweak(){
  const sp=APP.sp;const tips=[];
  Object.entries(sp.tweaks).forEach(([k,v])=>{
    const t=TWEAK_TIPS[k]?.[v];
    const d=TWEAK_DIMS.find(x=>x.key===k);
    if(t) tips.push(`【${d.label}${v==='reduce'?'降低':'加強'}】\n${t.join('\n')}`);
  });
  sp.tweakAdv=tips.join('\n\n');sp.showTweak=true;render(false);
}
function spSave(){
  const r=APP.sp.result;if(!r)return;
  if(SPECIALS.some(s=>s===r||s._id===r._id))return;
  r._id=Date.now();r.fav=false;
  SPECIALS.unshift(r);render(false);
}
function spRegenerate(){APP.sp.result=null;APP.sp.tweaks={};APP.sp.tweakAdv=null;APP.sp.showTweak=false;render(true);}
function spGenerate(){
  const sp=APP.sp;if(!sp.selCat)return;
  const bottles=catBottles(sp.selCat);
  const pLines=PREFS.map(p=>sp.prefs[p.key]?`${p.label}：${sp.prefs[p.key]}`:null).filter(Boolean).join('、');
  sp._reqText=`【特調生成請求】基酒：${sp.selCat} | 喜好：${pLines||'自由發揮'} | 酒櫃：${bottles.map(b=>b.name).join('、')}\n\n請以 JSON 格式回覆一款特調配方，務必使用以下確切的欄位名稱：\n{\n  "name": "中文酒名",\n  "name_en": "英文酒名",\n  "concept": "風味概念說明",\n  "base_bottle": "建議使用的酒款名",\n  "base_reason": "選這瓶的原因",\n  "method": "調製方式如Shake/Stir/Build",\n  "method_note": "調製說明",\n  "glass": "杯型",\n  "glass_note": "杯型說明",\n  "ingredients": [{"zh":"材料中文名","en":"材料英文名","amount":"45ml"}],\n  "steps": ["步驟1","步驟2"],\n  "garnish": [{"item":"裝飾名","note":"說明"}],\n  "flavor_tags": ["風味標籤1","風味標籤2"],\n  "bartender_note": "調酒師備註"\n}\n注意：ingredients 陣列裡每個材料一定要有 zh、en、amount 三個欄位。請在 JSON 前後加上 ===JSON_START=== 和 ===JSON_END=== 標記。`;
  sp.step='copy';
  render(true);
}
function spCopyDone(){APP.sp.step='paste';render(false);}
function spSubmitPaste(){
  const ta=document.getElementById('sp-paste-area');
  if(!ta||!ta.value.trim())return;
  try{
    const txt=ta.value;
    const s=txt.indexOf('===JSON_START===');const e=txt.indexOf('===JSON_END===');
    const cleaned=s>=0&&e>s?txt.slice(s+16,e).trim():txt.slice(txt.indexOf('{'),txt.lastIndexOf('}')+1);
    APP.sp.result=JSON.parse(cleaned);
  }catch(err){APP.sp.result={error:true};}
  APP.sp.step=null;render(true);
}
function spCopyText(){
  const el=document.getElementById('sp-req-text');if(!el)return;
  el.select();el.setSelectionRange(0,99999);
  try{document.execCommand('copy');}catch(e){}
  if(navigator.clipboard)navigator.clipboard.writeText(el.value).catch(()=>{});
  const btn=document.getElementById('sp-copy-btn');
  if(btn){btn.textContent='✓ 已複製！';btn.style.background='#2a4a2a';btn.style.color='#4a9a6a';btn.style.borderColor='#4a9a6a';}
}

// ─── MODALS ──────────────────────────────────────────────
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">${html}</div>`;}

// Add Bottle
function openAddBottleModal(editId){
  const b=editId?BOTTLES.find(x=>x.id===editId):{};
  showModal(`<div class="modal">
    <div class="modal-title">${editId?'編輯酒瓶':'新增酒瓶'}</div>
    <div class="field"><label>中文名稱</label><input id="m-name" value="${esc(b.name||'')}"></div>
    <div class="field"><label>英文名稱</label><input id="m-en" value="${esc(b.en||'')}"></div>
    <div class="field"><label>類型</label>
      <select id="m-cat">
        ${['威士忌','琴酒','蘭姆酒','龍舌蘭','伏特加','苦精','利口酒','其他'].map(c=>`<option${(b.cat||'威士忌')===c?' selected':''}>${c}</option>`).join('')}
      </select></div>
    <div class="field"><label>ABV (%)</label><input id="m-abv" type="number" step="0.1" value="${b.abv||''}"></div>

    <div class="field"><label>濃烈程度 1–5</label><input id="m-strength" type="number" min="1" max="5" value="${b.strength||3}"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" onclick="submitBottle(${editId||0})">儲存</button>
    </div>
  </div>`);
}
function submitBottle(editId){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  const data={name,en:document.getElementById('m-en').value.trim(),cat:document.getElementById('m-cat').value,abv:parseFloat(document.getElementById('m-abv').value)||0,flavor:document.getElementById('m-flavor').value.split(/[,，、]/).map(s=>s.trim()).filter(Boolean),strength:parseInt(document.getElementById('m-strength').value)||3,img:null};
  if(editId){const b=BOTTLES.find(x=>x.id===editId);if(b){Object.assign(b,data);b.img=b.img;}}
  else{data.id=nextId.bottle++;BOTTLES.push(data);}
  closeModal();render(false);
}

// Add Recipe

  const r=editId?RECIPES.find(x=>x.id===editId):{};
  showModal(`<div class="modal">
    <div class="modal-title">${editId?'編輯配方':'新增調酒'}</div>
    <div class="field"><label>名稱</label><input id="m-name" value="${esc(r.name||'')}"></div>

    <div class="field"><label>描述</label><textarea id="m-desc">${esc(r.desc||'')}</textarea></div>
    <div class="field"><label>調製方式（Stir / Shake / Build）</label><input id="m-method" value="${esc(r.method?.label||'')}"></div>

      <div class="field-hint">例：波本威士忌 / Bourbon Whiskey / 60ml</div></div>

}
function openEditRecipeModal(id){openAddRecipeModal(id);}
function submitRecipe(editId){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  const ingrLines=document.getElementById('m-ingr').value.trim().split('\n').filter(Boolean).map(l=>{
    const p=l.split('/').map(s=>s.trim());
    return{zh:p[0]||l,en:p[1]||'',a:p[2]||'',type:null,sel:null};
  });
  const data={name,base:document.getElementById('m-base').value.trim(),cat:document.getElementById('m-cat').value.trim(),desc:document.getElementById('m-desc').value.trim(),
    method:{label:document.getElementById('m-method').value.trim(),sub:document.getElementById('m-method-sub').value.trim()},
    glass:{label:document.getElementById('m-glass').value.trim(),sub:document.getElementById('m-glass-sub').value.trim()},
    ingr:ingrLines,
    steps:document.getElementById('m-steps').value.trim().split('\n').filter(Boolean),
    garnish:document.getElementById('m-garnish').value.trim().split('\n').filter(Boolean).map(l=>{const p=l.split('/').map(s=>s.trim());return{item:p[0]||l,note:p[1]||''};})
  };
  if(editId){const r=RECIPES.find(x=>x.id===editId);if(r){const keep={id:r.id,fav:r.fav,img:r.img};Object.assign(r,data,keep);}}
  else{data.id=nextId.recipe++;data.fav=false;data.img=null;RECIPES.push(data);}
  closeModal();render(false);
}

function openEditFoodModal(id){openAddFoodModal(id);}
function submitFood(editId){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  const data={name,cat:document.getElementById('m-cat').value.trim(),desc:document.getElementById('m-desc').value.trim(),pairing:document.getElementById('m-pair').value.trim(),
    ingr:document.getElementById('m-ingr').value.trim().split('\n').filter(Boolean).map(l=>{const p=l.split('/').map(s=>s.trim());return{item:p[0]||l,amt:p[1]||''};}),

  };
